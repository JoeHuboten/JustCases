name: Security Scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Run every Monday at 07:00 UTC
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        # Report high and critical severity vulnerabilities; exit non-zero to fail the job
        run: npm audit --audit-level=high
