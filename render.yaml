services:
  - type: web
    name: justcases
    runtime: node
    buildCommand: NODE_ENV=production npm ci && NODE_ENV=production npx prisma generate && NODE_ENV=production npm run build
    startCommand: NODE_ENV=production node .next/standalone/server.js
    region: frankfurt
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: RATE_LIMIT_FAIL_CLOSED
        value: "true"
