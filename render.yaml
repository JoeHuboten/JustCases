services:
  - type: web
    name: justcases
    runtime: node
    buildCommand: npm ci && npx prisma generate && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    startCommand: npm start
    region: frankfurt
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: RATE_LIMIT_FAIL_CLOSED
        value: "true"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: PORT
        value: "3000"
