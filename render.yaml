services:
  - type: web
    name: justcases
    runtime: node
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    region: frankfurt
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Database — set in Render dashboard:
      # DATABASE_URL = postgresql://postgres.PROJECT_REF:PASSWORD@aws-0-eu-west-1.pooler.supabase.com:6543/postgres?pgbouncer=true
      # DIRECT_URL   = postgresql://postgres:PASSWORD@db.PROJECT_REF.supabase.co:5432/postgres
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # Auth
      - key: JWT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      # App URL (set to your Render service URL, e.g. https://justcases.onrender.com)
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Email — option A: Resend (free 3k/month, sign up at resend.com)
      - key: EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@justcases.bg
      # Supabase
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY
        sync: false
      # Stripe
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      # PayPal
      - key: NEXT_PUBLIC_PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: RATE_LIMIT_FAIL_CLOSED
        value: "true"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NODE_VERSION
        value: "20"
