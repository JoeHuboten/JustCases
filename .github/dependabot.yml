version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      # Group minor/patch updates together to reduce PR noise
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ignore major version bumps for core frameworks (handle manually)
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "security"
