name: Dependency Security Audit (PR)

on:
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Flags newly introduced vulnerable dependencies using GitHub's dependency
      # graph + advisory database. The action posts a summary on the PR itself.
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (ci - uses lockfile exactly)
        run: npm ci

      # Fail the PR if any high or critical vulnerabilities are found.
      # "npm audit --audit-level=high" exits non-zero only for high/critical.
      # The full JSON report is also saved as an artifact for review.
      - name: Run npm audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Save full audit report as artifact
        if: always()
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30
